syntax = "proto3";

package lab6;

service Lab6Service {
  rpc Add(AddMsg) returns (AddReply) {}
  rpc RawImage(RawImageMsg) returns (ImageReply) {}
  rpc DotProduct(DotProductMsg) returns (DotProductReply) {}
  rpc JsonImage(JsonImageMsg) returns (ImageReply) {}
}

message AddMsg {
  int32 a = 1;
  int32 b = 2;
}

message RawImageMsg {
  bytes img = 1;
}

message DotProductMsg {
  repeated float a = 1;
  repeated float b = 2;
}

message JsonImageMsg {
  string img = 1;
}

message AddReply {
  int32 sum = 1;
}

message DotProductReply {
  float dotproduct = 1;
}

message ImageReply {
  int32 width = 1;
  int32 height = 2;
}
